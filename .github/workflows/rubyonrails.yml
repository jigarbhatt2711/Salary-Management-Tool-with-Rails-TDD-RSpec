name: "Ruby on Rails CI"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      RAILS_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Setup database
        run: bin/rails db:prepare

      - name: Run tests
        run: bin/rake

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler-cache: true

      - name: Install binstubs
        run: bundle binstubs bundler-audit brakeman

      - name: Security audit dependencies
        run: bundle exec bundler-audit --update

      - name: Security audit code
        run: bundle exec brakeman -q -w2

      - name: Lint Ruby code
        run: bundle exec rubocop --parallel